<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java 学习笔记</title>
  <style>
    :root {
      --bg: #fefefe;
      --text: #2c2c2c;
      --muted: #888;
      --accent: #b14623;
      --border: #e8e8e8;
      --code-bg: #f6f6f6;
      --card-bg: #fdfdfd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 20px 64px;
    }

    /* ── Header ── */
    header {
      padding: 40px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--accent);
    }

    header p {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
    }

    /* ── Post List ── */
    .post-list { list-style: none; }

    .post-list li {
      border-bottom: 1px solid var(--border);
      padding: 18px 0;
    }

    .post-list li:last-child { border-bottom: none; }

    .post-list a {
      text-decoration: none;
      color: inherit;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      transition: color 0.15s;
    }

    .post-list a:hover { color: var(--accent); }

    .post-list .title {
      font-size: 1.08rem;
      font-weight: 600;
    }

    .post-list .date {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Article (post page) ── */
    article h1 {
      font-size: 1.7rem;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    article .meta {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 36px;
    }

    article h2 {
      font-size: 1.2rem;
      margin: 36px 0 10px;
      color: var(--accent);
    }

    article p {
      margin-bottom: 14px;
      text-align: justify;
    }

    article pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 18px;
      overflow-x: auto;
      font-size: 0.9rem;
      line-height: 1.65;
      margin-bottom: 18px;
    }

    article code {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono",
        "Consolas", monospace;
      font-size: 0.9em;
    }

    article p code {
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ── Back link ── */
    .back {
      display: inline-block;
      margin-top: 32px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.92rem;
    }

    .back:hover { text-decoration: underline; }

    /* ── Footer ── */
    footer {
      margin-top: 64px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 16px 16px 48px; }
      header { padding: 28px 0 20px; margin-bottom: 24px; }
      header h1 { font-size: 1.5rem; }
      article h1 { font-size: 1.4rem; }
      .post-list a { flex-direction: column; gap: 2px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Java 学习笔记</h1>
  <p>记录每一段成长 · 从 Hello World 开始</p>
</header>

<main>
  <ul class="post-list">
    <li>
      <a href="post3.html">
        <span class="title">Java 的继承与接口</span>
        <span class="date">2026-05-11</span>
      </a>
    </li>
    <li>
      <a href="post2.html">
        <span class="title">Java 的类与对象</span>
        <span class="date">2026-05-11</span>
      </a>
    </li>
  </ul>
</main>

<footer>
  用纸笔写代码，用耐心学 Java
</footer>

</body>
</html>
